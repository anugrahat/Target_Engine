validation:
  experimental:
    - multiple in vitro anti-fibrotic assays
    - multiple in vivo fibrosis models
  clinical:
    - NCT05154240
    - CTR20221542
  notes: Target-to-molecule progression is unusually strong; benchmark labels must avoid leakage from later clinical outcomes.
open_questions:
  - Recover per-cohort case and control sample counts for the remaining unresolved discovery GEO datasets.
  - Define contrast logic for blood versus lung cohorts.
  - Decide how to benchmark TNIK discovery without using later phase I evidence as a discovery-time label.
