schema_version: "0.1.0"
subset_id: als_cns_core
benchmark_id: als_pandaomics
mode: curated_prioritx_subset
objective: First-wave ALS CNS benchmark subset restricted to accession-coded transcriptomic cohorts with explicit counts and direct case-control framing.
readiness: candidate
inclusion_principles:
  - Prefer accession-coded postmortem CNS or motor-neuron transcriptomic comparisons with explicit case and control counts.
  - Exclude consortium resources and multi-comparison accessions until stable public identifiers or per-comparison manifests are encoded.
  - Keep experimental Drosophila rescue labels in evaluation only, never as discovery-time features.
included_datasets:
  - id: E-MTAB-1925
    source: ArrayExpress
    selection_mode: direct
    case_definition: Motor cortex samples from familial ALS C9ORF72 expansion carriers
    control_definition: Matched control motor cortex samples
    sample_counts:
      case: 3
      control: 3
    reason: Explicit Table 1 motor cortex comparison with accession-coded case and control counts.
  - id: GSE68605
    source: GEO
    selection_mode: direct
    case_definition: Motor neurons from familial ALS C9ORF72 expansion carriers
    control_definition: Matched control motor neurons
    sample_counts:
      case: 8
      control: 3
    reason: Explicit Table 1 motor-neuron comparison with accession-coded case and control counts.
  - id: GSE20589
    source: GEO
    selection_mode: direct
    case_definition: Motor neurons from familial ALS SOD1 carriers
    control_definition: Matched control motor neurons
    sample_counts:
      case: 3
      control: 7
    reason: Explicit Table 1 motor-neuron comparison with accession-coded case and control counts.
  - id: GSE122649
    source: GEO
    selection_mode: direct
    case_definition: Sporadic ALS motor cortex samples
    control_definition: Matched control motor cortex samples
    sample_counts:
      case: 26
      control: 12
    reason: Explicit Table 1 sALS motor cortex comparison with accession-coded counts.
  - id: GSE19332
    source: GEO
    selection_mode: direct
    case_definition: CHMP2B-related ALS motor neurons
    control_definition: Matched control motor neurons
    sample_counts:
      case: 3
      control: 7
    reason: Explicit Table 1 motor-neuron comparison with accession-coded counts; GEO metadata identifies the case arm as CHMP2B-related ALS.
  - id: GSE76220
    source: GEO
    selection_mode: direct
    case_definition: Sporadic ALS spinal motor neurons
    control_definition: Matched control spinal motor neurons
    sample_counts:
      case: 13
      control: 8
    reason: Explicit Table 1 spinal motor-neuron comparison with accession-coded counts.
excluded_datasets:
  - id: A-MEXP-2246
    reason: Control-reference accession for the E-MTAB-1925 comparison rather than a standalone ALS discovery cohort.
  - id: GSE67196
    reason: Multiple tissue-specific comparisons are bundled under one accession and should be split into per-comparison manifests before admission.
  - id: GSE124439
    reason: Frontal and motor cortex comparisons are bundled under one accession and should be split into per-comparison manifests before admission.
  - id: Answer ALS transcriptomics
    reason: High-value induced motor-neuron resource, but stable public identifiers and exact subset manifests remain incomplete for first-wave benchmarking.
  - id: Answer ALS proteomics
    reason: High-value induced motor-neuron resource, but stable public identifiers and exact subset manifests remain incomplete for first-wave benchmarking.
notes: This subset is intentionally conservative and encodes only the cleanest accession-backed CNS comparisons from the ALS PandaOmics paper.
